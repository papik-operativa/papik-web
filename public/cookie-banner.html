<!-- PAPIK · Cookie consent banner snippet
     Inject at the start of <body>. The text shown is a CA fallback;
     cookie-banner.js localises it in place using the page's <html lang>. -->
<aside id="papik-cc-banner"
       class="papik-cc"
       role="region"
       aria-label="Avís de galetes"
       hidden>
  <div class="papik-cc-inner">
    <div class="papik-cc-copy">
      <h2 data-cc-text="title">Aquesta web utilitza galetes</h2>
      <p data-cc-text="body">
        Utilitzem galetes pròpies i de tercers per analitzar el nostre servei i mostrar-te
        publicitat relacionada amb les teves preferències. Pots acceptar-les totes,
        rebutjar-les totes o configurar-les.
      </p>
    </div>
    <div class="papik-cc-actions">
      <button type="button" class="papik-cc-btn papik-cc-btn--ghost" data-cc-action="reject">Rebutjar tot</button>
      <button type="button" class="papik-cc-btn papik-cc-btn--ghost" data-cc-action="configure">Configurar</button>
      <button type="button" class="papik-cc-btn papik-cc-btn--primary" data-cc-action="accept">Acceptar tot</button>
    </div>
  </div>
</aside>
